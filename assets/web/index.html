<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Sync</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="wrap">
        <h1>SMS Sync</h1>

        <div class="gate" id="gate">
            <p>Enter the security key shown on the phone.</p>
            <input id="secretInput" type="text" placeholder="Security key" autocomplete="off" autocapitalize="off">
            <button id="connectBtn" type="button">Connect</button>
            <p class="error" id="errorMsg"></p>
        </div>

        <div class="messages" id="messages"></div>
    </div>

    <script>
        function renderMessages(list) {
            const container = document.getElementById('messages');
            container.innerHTML = '';

            if (!list || list.length === 0) {
                container.innerHTML = '<div class="empty">No messages yet</div>';
            } else {
                for (const m of list) {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML =
                        '<div class="address"></div><div class="body"></div>';
                    div.querySelector('.address').textContent = m.address || 'Unknown';
                    div.querySelector('.body').textContent = m.body || '';
                    container.appendChild(div);
                }
            }

            document.getElementById('gate').style.display = 'none';
            container.style.display = 'flex';
        }

        async function connect() {
            const secretInput = document.getElementById('secretInput');
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('connectBtn');
            const secret = secretInput.value.trim();

            errorMsg.textContent = '';
            if (!secret) {
                errorMsg.textContent = 'Enter the security key.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Connecting…';

            try {
                const res = await fetch('/messages', {
                    headers: { 'X-Sync-Secret': secret }
                });

                if (res.status === 401) {
                    errorMsg.textContent = 'Incorrect security key.';
                    btn.disabled = false;
                    btn.textContent = 'Connect';
                    return;
                }

                const payload = await res.json();
                console.log("Messages: ", payload);

                renderMessages(payload.messages);
            } catch (e) {
                errorMsg.textContent = `Error Occurred. ${e}.`;
                btn.disabled = false;
                btn.textContent = 'Connect';
            }
        }

        document.getElementById('connectBtn').addEventListener('click', connect);
        document.getElementById('secretInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>

</html>
